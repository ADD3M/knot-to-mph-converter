<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knot to MPH Converter</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #0a0a0a 100%);
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9),
                    0 0 0 1px rgba(80, 80, 80, 0.2) inset;
      border: 1px solid rgba(80, 80, 80, 0.2);
    }

    h1 {
      text-align: center;
      color: #e5e5e5;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #7a7a7a;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .card {
      background: linear-gradient(145deg, rgba(35, 35, 35, 0.8), rgba(25, 25, 25, 0.7));
      border: 1px solid rgba(60, 60, 60, 0.3);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(60, 60, 60, 0.08) inset;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6),
                    0 0 0 1px rgba(60, 60, 60, 0.15) inset;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #9a9a9a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    input[type="number"] {
      width: 100%;
      padding: 16px 16px 16px 48px;
      font-size: 18px;
      border: 2px solid rgba(60, 60, 60, 0.4);
      border-radius: 12px;
      background: rgba(15, 15, 15, 0.9);
      color: #e5e5e5;
      transition: all 0.3s ease;
      outline: none;
      -moz-appearance: textfield;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"]::-moz-outer-spin-button,
    input[type="number"]::-moz-inner-spin-button {
      display: none;
    }

    input[type="number"]:focus {
      border-color: #b0b0b0;
      box-shadow: 0 0 0 4px rgba(80, 80, 80, 0.3);
    }

    input[type="number"]:focus::placeholder {
      color: transparent;
    }

    input[type="number"]:disabled {
      background: rgba(30, 30, 30, 0.8);
      color: #8a8a8a;
    }

    .unit {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #5a5a5a;
      font-size: 14px;
      font-weight: 500;
    }

    .direction-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid rgba(60, 60, 60, 0.3);
      border-radius: 12px;
      background: rgba(15, 15, 15, 0.6);
      color: #7a7a7a;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .toggle-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .toggle-btn:active::before {
      width: 300px;
      height: 300px;
    }

    .toggle-btn:hover {
      border-color: rgba(80, 80, 80, 0.5);
      color: #d0d0d0;
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, #3a3a3a, #2a2a2a);
      border-color: #555555;
      color: #fff;
      box-shadow: 0 4px 12px rgba(60, 60, 60, 0.5);
    }

    .toggle-btn.active::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      padding: 2px;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .arrow {
      text-align: center;
      font-size: 24px;
      color: #9a9a9a;
      margin: 12px 0;
    }

    .arrow svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      transition: transform 0.3s ease;
    }

    .arrow.active svg {
      transform: rotate(180deg);
    }

    .result {
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid rgba(60, 60, 60, 0.2);
    }

    .result-label {
      font-size: 13px;
      color: #6a6a6a;
      margin-bottom: 6px;
    }

    .result-value {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #c5c5c5, #a5a5a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: rgba(60, 60, 60, 0.2);
      color: #a0a0a0;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      padding: 2px;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .copy-btn:hover::before {
      opacity: 1;
    }

    .copy-btn:hover {
      background: rgba(60, 60, 60, 0.35);
      color: #d0d0d0;
      transform: translateY(-1px);
    }

    .copy-btn:active {
      transform: scale(0.95);
    }

    .copy-btn.copied {
      background: rgba(50, 90, 50, 0.35);
      color: #60c060;
    }

    .copy-btn.copied svg {
      animation: bounce 0.6s ease;
    }

    .copy-btn.active.color-cycle {
      animation: hueCycle 9s ease-in-out infinite;
    }

    .copy-btn {
      animation: softPulse 3s ease-in-out infinite;
    }

    .copy-btn {
      animation: softPulse 3s ease-in-out infinite;
    }

    .copy-btn {
      animation: softPulse 3s ease-in-out infinite;
    }

    @keyframes bounce {
      margin-top: 24px;
      padding: 16px;
      background: rgba(15, 15, 15, 0.6);
      border: 1px solid rgba(60, 60, 60, 0.2);
      border-radius: 12px;
      font-size: 13px;
      color: #7a7a7a;
      text-align: center;
    }

    .formula strong {
      color: #e5e5e5;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }

    /* Color cycling animation */
    @keyframes hueCycle {
      0% { filter: hue-rotate(0deg) saturate(100%); }
      25% { filter: hue-rotate(90deg) saturate(120%); }
      50% { filter: hue-rotate(180deg) saturate(100%); }
      75% { filter: hue-rotate(270deg) saturate(120%); }
      100% { filter: hue-rotate(360deg) saturate(100%); }
    }

    .color-cycle {
      animation: hueCycle 9s ease-in-out infinite;
    }

    /* Pulse animation for inactive buttons */
    @keyframes softPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.01); }
    }

    .soft-pulse {
      animation: softPulse 3s ease-in-out infinite;
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px;
      }

      h1 {
        font-size: 24px;
      }

      .result-value {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Knot to MPH Converter</h1>
    <p class="subtitle">Convert between nautical miles per hour and miles per hour</p>

    <div class="card">
      <div class="label">
        <span>From</span>
      </div>
      <div class="input-wrapper">
        <input type="number" id="inputValue" placeholder="Enter value" step="any" min="0">
        <span class="unit" id="inputUnit">knots</span>
      </div>
    </div>

    <div class="direction-toggle">
      <button class="toggle-btn active" data-direction="knots-to-mph" id="btnKnotsToMph">
        Knots → MPH
      </button>
      <button class="toggle-btn" data-direction="mph-to-knots" id="btnMphToKnots">
        MPH → Knots
      </button>
    </div>

    <div class="arrow active" id="arrowIcon">
      <svg viewBox="0 0 24 24">
        <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
      </svg>
    </div>

    <div class="card">
      <div class="label">
        <span>To</span>
      </div>
      <div class="input-wrapper">
        <input type="number" id="outputValue" placeholder="Result" disabled step="any" min="0">
        <span class="unit" id="outputUnit">mph</span>
      </div>
    </div>

    <div class="result">
      <div class="result-label">Result</div>
      <div class="result-value" id="resultValue">0</div>
    </div>

    <div class="copy-btn" id="copyBtn" title="Copy to clipboard" aria-label="Copy result to clipboard">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
      </svg>
    </div>

  </div>

  <script>
    const inputValue = document.getElementById('inputValue');
    const outputValue = document.getElementById('outputValue');
    const resultValue = document.getElementById('resultValue');
    const inputUnit = document.getElementById('inputUnit');
    const outputUnit = document.getElementById('outputUnit');
    const arrowIcon = document.getElementById('arrowIcon');
    const toggleBtns = document.querySelectorAll('.toggle-btn');
    const copyBtn = document.getElementById('copyBtn');

    const CONVERSION_FACTOR = 1.15078;

    // Debounce timer reference
    let debounceTimer = null;
    const DEBOUNCE_DELAY = 300;

    // Track last valid conversion
    let lastValidConversion = false;

    // Track if pulse animation is currently active
    let pulseAnimationActive = false;

    // Copy to clipboard with better error handling
    copyBtn.addEventListener('click', async () => {
      const text = resultValue.textContent.trim();
      if (!text || text === '0') return;

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.classList.add('copied');
        copyBtn.querySelector('svg').style.opacity = '0.7';

        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.querySelector('svg').style.opacity = '1';
        }, 1500);
      } catch (err) {
        console.warn('Clipboard API failed, using fallback');
        // Fallback for older browsers
        try {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          copyBtn.classList.add('copied');
          copyBtn.querySelector('svg').style.opacity = '0.7';

          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('svg').style.opacity = '1';
          }, 1500);
        } catch (fallbackErr) {
          console.error('Fallback clipboard method also failed:', fallbackErr);
          // Show a visual fallback indicator
          copyBtn.style.background = 'rgba(180, 60, 60, 0.3)';
          copyBtn.querySelector('svg').style.color = '#e34c26';
          setTimeout(() => {
            copyBtn.style.background = '';
            copyBtn.querySelector('svg').style.color = '';
          }, 2000);
        }
      }
    });

    function validateInput(value) {
      // Convert to string and trim whitespace
      const str = String(value).trim();

      // Handle empty string
      if (str === '') {
        return { valid: false, error: 'empty' };
      }

      // Remove leading/trailing whitespace and handle +/- signs
      const cleaned = str.replace(/^[\s\+\-]+|[\s\+\-]+$/g, '');

      // Handle non-numeric characters (except decimal point and minus)
      if (/[^\d\.\-]/.test(cleaned)) {
        return { valid: false, error: 'invalid' };
      }

      const num = Number(cleaned);

      // Handle NaN
      if (Number.isNaN(num)) {
        return { valid: false, error: 'nan' };
      }

      // Handle Infinity and -Infinity
      if (!Number.isFinite(num)) {
        return { valid: false, error: 'infinity' };
      }

      // Check for extremely large numbers that might cause precision issues
      if (num > 1e15 || num < -1e15) {
        return { valid: false, error: 'overflow' };
      }

      // Handle zero and negative values
      if (num <= 0) {
        return { valid: false, error: 'non-positive' };
      }

      return { valid: true, value: num };
    }

    function formatResult(value) {
      // Handle edge case: zero or very small numbers
      if (value === 0) {
        return '0.00';
      }

      // Check for precision issues with very small numbers
      if (Math.abs(value) < 1e-10) {
        return '0.00';
      }

      // Format with proper rounding
      const formatted = value.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      return formatted;
    }

    function convert() {
      const rawInput = inputValue.value;
      const validation = validateInput(rawInput);

      if (!validation.valid) {
        // Clear output on invalid input
        outputValue.value = '';
        resultValue.textContent = '0';
        lastValidConversion = false;
        return;
      }

      const value = validation.value;
      const direction = document.getElementById('btnKnotsToMph').classList.contains('active')
        ? 'knots-to-mph'
        : 'mph-to-knots';

      let result;
      if (direction === 'knots-to-mph') {
        result = value * CONVERSION_FACTOR;
      } else {
        result = value / CONVERSION_FACTOR;
      }

      // Check for conversion errors (divide by zero, etc.)
      if (!Number.isFinite(result) || !Number.isSafeInteger(Math.round(result))) {
        outputValue.value = '';
        resultValue.textContent = '0';
        lastValidConversion = false;
        return;
      }

      outputValue.value = result.toFixed(6);
      resultValue.textContent = formatResult(result);
      lastValidConversion = true;

      // Only fire pulse animation on valid conversions, and only if not already active
      if (!pulseAnimationActive && lastValidConversion) {
        pulseAnimationActive = true;
        resultValue.classList.remove('pulse');
        void resultValue.offsetWidth; // trigger reflow
        resultValue.classList.add('pulse');
        setTimeout(() => {
          resultValue.classList.remove('pulse');
          pulseAnimationActive = false;
        }, 2000);
      }
    }

    function updateUI() {
      const direction = document.getElementById('btnKnotsToMph').classList.contains('active')
        ? 'knots-to-mph'
        : 'mph-to-knots';

      if (direction === 'knots-to-mph') {
        inputUnit.textContent = 'knots';
        outputUnit.textContent = 'mph';
        arrowIcon.classList.add('active');
      } else {
        inputUnit.textContent = 'mph';
        outputUnit.textContent = 'knots';
        arrowIcon.classList.remove('active');
      }

      convert();
    }

    // Debounced input handler
    inputValue.addEventListener('input', () => {
      // Clear pulse animation on any input
      resultValue.classList.remove('pulse');
      pulseAnimationActive = false;

      // Debounce the conversion
      if (debounceTimer) {
        clearTimeout(debounceTimer);
      }
      debounceTimer = setTimeout(convert, DEBOUNCE_DELAY);
    });

    // Clear conversion on focus loss (user might be correcting input)
    inputValue.addEventListener('blur', () => {
      // Let the user see the result of their input
      convert();
    });

    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Only trigger shortcuts when input is focused
      if (document.activeElement !== inputValue) return;

      // Ctrl + C to copy
      if (e.ctrlKey && e.key === 'c') {
        e.preventDefault();
        const text = resultValue.textContent.trim();
        if (text && text !== '0') {
          copyBtn.click();
        }
      }

      // Arrow keys to toggle direction
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        const currentDir = document.getElementById('btnKnotsToMph').classList.contains('active');
        const nextDir = currentDir ? 'mph-to-knots' : 'knots-to-mph';
        const nextBtn = document.getElementById(nextDir === 'knots-to-mph' ? 'btnKnotsToMph' : 'btnMphToKnots');
        nextBtn.click();
      }
    });

    // Handle Enter key to clear input
    inputValue.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        inputValue.value = '';
        convert();
      }
    });

    // Handle paste event with validation
    inputValue.addEventListener('paste', (e) => {
      // Wait for the pasted value to appear
      setTimeout(() => {
        convert();
      }, 0);
    });

    // Initialize with a default value
    inputValue.value = '10';
    convert();
  </script>
</body>
</html>
